# 1. Configuración de la aplicación
apiVersion: v1
kind: ConfigMap
metadata:
  name: devsu-demo-config
data:
  PORT: "8000"
  NAME_DB: "jdbc:h2:file:/app/data/testdb"
  USERNAME_DB: "user"
  PASSWORD_DB: "password"
---
# 2. Almacenamiento persistente para H2
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: h2-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
# 3. Despliegue de la aplicación
apiVersion: apps/v1
kind: Deployment
metadata:
  name: devsu-demo-app
  labels:
    app: devsu-demo
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: devsu-demo
  template:
    metadata:
      labels:
        app: devsu-demo
    spec:
      securityContext:
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: devsu-demo
          image: IMAGE_PLACEHOLDER
          imagePullPolicy: Always
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1024Mi" 
              cpu: "500m"
          ports:
            - containerPort: 8000
              name: http
          envFrom:
            - configMapRef:
                name: devsu-demo-config
          livenessProbe:
            httpGet:
              path: /api/actuator/health
              port: 8000
            initialDelaySeconds: 40
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/actuator/health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          volumeMounts:
            - name: data-storage
              mountPath: /app/data
      volumes:
        - name: data-storage
          persistentVolumeClaim:
            claimName: h2-pvc
---
# 4. Servicio para exponer la app
apiVersion: v1
kind: Service
metadata:
  name: devsu-demo-service
spec:
  type: NodePort
  selector:
    app: devsu-demo
  ports:
    - port: 8000
      targetPort: 8000
      nodePort: 30080