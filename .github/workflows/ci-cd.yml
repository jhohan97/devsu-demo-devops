name: CI/CD Pipeline

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]

env:
  DOCKER_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/devsu-demo-devops
  JAVA_VERSION: '17'

jobs:
  # ─────────────────────────────────────────
  # JOB 1: Build, Test, Coverage & Static Analysis
  # ─────────────────────────────────────────
  build-and-test:
    name: Build, Test & Analyze
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: ./mvnw clean compile -B

      - name: Run Unit Tests & Generate Coverage Report
        run: ./mvnw test jacoco:report -B

      - name: Publish Test Results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: target/surefire-reports/*.xml

      - name: Upload Coverage Report
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-coverage-report
          path: target/site/jacoco/

      - name: Static Code Analysis with SonarCloud
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ./mvnw sonar:sonar \
            -Dsonar.projectKey=${{ secrets.SONAR_PROJECT_KEY }} \
            -Dsonar.organization=${{ secrets.SONAR_ORGANIZATION }} \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml \
            -B

  # ─────────────────────────────────────────
  # JOB 2: Docker Build, Scan & Push
  # ─────────────────────────────────────────
  docker-build-and-push:
    name: Docker Build, Scan & Push
    runs-on: ubuntu-latest
    needs: build-and-test

    # ── Exporta el tag SHA para que el job de deploy lo use ──
    outputs:
      image_tag: ${{ steps.vars.outputs.image_tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ── Metadata (tags) ──
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_IMAGE }}
          tags: |
            type=sha,prefix=sha-
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      # ── Guardar el tag SHA como output ──
      - name: Get image tag for deploy
        id: vars
        run: echo "image_tag=sha-$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          load: true

      - name: Scan Docker image for vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.DOCKER_IMAGE }}:latest
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'

      - name: Upload Trivy scan results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Push Docker image to Docker Hub
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # ─────────────────────────────────────────
  # JOB 3: Deploy to Minikube
  # ─────────────────────────────────────────
  deploy:
    name: Deploy to Minikube
    runs-on: self-hosted
    needs: docker-build-and-push

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Use Minikube context
        run: kubectl config use-context minikube

      - name: Apply base manifests
        run: kubectl apply -f k8s/manifests.yaml

      - name: Set deployment image
        run: |
          kubectl set image deployment/devsu-demo-app \
            devsu-demo=${{ env.DOCKER_IMAGE }}:${{ needs.docker-build-and-push.outputs.image_tag }}

      - name: Wait for rollout
        run: kubectl rollout status deployment/devsu-demo-app --timeout=180s

      - name: Show service URL
        run: |
          echo "App disponible en:"
          minikube service devsu-demo-service --url